# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - UN80-Dboard2-Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: "ubuntu-latest"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to registry
        uses: docker/login-action@v2
        with:
          registry: https://undashboarddevregistry.azurecr.io/
          username: ${{ secrets.AzureAppService_ContainerUsername_d1ee42b2ff344239bfca6eb86ed892e4 }}
          password: ${{ secrets.AzureAppService_ContainerPassword_3cfd9429423846518ab5755d92e21862 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: undashboarddevregistry.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_d1ee42b2ff344239bfca6eb86ed892e4 }}/lowercaseimage:${{ github.sha }}
          file: ./website/Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: "UN80-Dboard2-Dev"
          slot-name: "production"
          publish-profile: ${{ secrets.AzureAppService_PublishProfile_8a0893d0c68143288fec4026da39f25c }}
          images: "undashboarddevregistry.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_d1ee42b2ff344239bfca6eb86ed892e4 }}/lowercaseimage:${{ github.sha }}"
