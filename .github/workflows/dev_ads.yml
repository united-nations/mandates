# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - ads

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://mcr.microsoft.com/
        username: ${{ secrets.AzureAppService_ContainerUsername_cf4d1b5b943843aeb338bce06f78b530 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_ba4299986d274239ac3189eaa07f9dca }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: mcr.microsoft.com/${{ secrets.AzureAppService_ContainerUsername_cf4d1b5b943843aeb338bce06f78b530 }}/appsvc/staticsite:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'ads'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_f7a03e865b2e4181b65e3e10a8eed7a2 }}
        images: 'mcr.microsoft.com/${{ secrets.AzureAppService_ContainerUsername_cf4d1b5b943843aeb338bce06f78b530 }}/appsvc/staticsite:${{ github.sha }}'