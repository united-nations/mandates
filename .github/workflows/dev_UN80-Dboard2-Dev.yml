# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - UN80-Dboard2-Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:
    runs-on: 'ubuntu-latest'

    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to registry
      uses: docker/login-action@v2
      with:
        registry: https://undashboarddevregistry.azurecr.io/
        username: ${{ secrets.AzureAppService_ContainerUsername_6f50f53118404cad8bfc49e0aafadb27 }}
        password: ${{ secrets.AzureAppService_ContainerPassword_bcfa3fc4d8794c4eb62717e3eade559e }}

    - name: Build and push container image to registry
      uses: docker/build-push-action@v3
      with:
        push: true
        tags: undashboarddevregistry.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_6f50f53118404cad8bfc49e0aafadb27 }}/undashboarddevregistry/lowercaseimage:${{ github.sha }}
        file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
    - name: Deploy to Azure Web App
      id: deploy-to-webapp
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'UN80-Dboard2-Dev'
        slot-name: 'production'
        publish-profile: ${{ secrets.AzureAppService_PublishProfile_6dc926c677f549ec9b47d9f6fe0a4baa }}
        images: 'undashboarddevregistry.azurecr.io/${{ secrets.AzureAppService_ContainerUsername_6f50f53118404cad8bfc49e0aafadb27 }}/undashboarddevregistry/lowercaseimage:${{ github.sha }}'